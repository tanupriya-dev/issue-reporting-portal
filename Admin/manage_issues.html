<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Issues - Admin Panel</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar admin-nav">
        <div class="nav-brand">Admin Panel</div>
        <ul class="nav-links">
            <li><a href="admin-dashboard.html">Dashboard</a></li>
            <li><a href="manage-issues.html" class="active">Manage Issues</a></li>
            <li><a href="manage-users.html">Manage Users</a></li>
            <li><a href="../php/logout.php" class="btn-logout">Logout</a></li>
        </ul>
    </nav>
    
    <main class="main-content">
        <div class="page-header">
            <h1>Manage Issues</h1>
            <div class="filter-container">
                <select id="statusFilter">
                    <option value="all">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Closed">Closed</option>
                </select>
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="IT">IT / Technical</option>
                    <option value="HR">HR / Administrative</option>
                    <option value="Facilities">Facilities</option>
                    <option value="Security">Security</option>
                    <option value="Other">Other</option>
                </select>
                <input type="text" id="searchInput" placeholder="Search issues...">
            </div>
        </div>
        
        <div class="issues-container">
            <table class="issues-table admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>User</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="issuesTableBody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </main>
    
    <!-- Status Update Modal -->
    <div class="modal" id="statusModal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Update Issue Status</h2>
            <form id="updateStatusForm">
                <input type="hidden" id="issueId" name="issue_id">
                <div class="form-group">
                    <label for="newStatus">Status</label>
                    <select id="newStatus" name="status" required>
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Resolved">Resolved</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Update Status</button>
            </form>
        </div>
    </div>
    
    <script src="../js/manage-issues.js"></script>
</body>
</html>
