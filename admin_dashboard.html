<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Issues - Issue Reporting Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Issue Reporting Portal</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="report-issue.html">Report Issue</a></li>
            <li><a href="my-issues.html" class="active">My Issues</a></li>
            <li><a href="php/logout.php" class="btn-logout">Logout</a></li>
        </ul>
    </nav>
    
    <main class="main-content">
        <div class="page-header">
            <h1>My Issues</h1>
            <div class="filter-container">
                <label for="statusFilter">Filter by Status:</label>
                <select id="statusFilter">
                    <option value="all">All</option>
                    <option value="Pending">Pending</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Resolved">Resolved</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>
        </div>
        
        <div class="issues-container">
            <table class="issues-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Date Reported</th>
                    </tr>
                </thead>
                <tbody id="issuesTableBody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
            
            <div class="no-issues" id="noIssues" style="display: none;">
                <p>No issues found. <a href="report-issue.html">Report your first issue</a></p>
            </div>
        </div>
    </main>
    
    <script src="js/my-issues.js"></script>
</body>
</html>
