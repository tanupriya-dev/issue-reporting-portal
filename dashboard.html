<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Issue Reporting Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Issue Reporting Portal</div>
        <ul class="nav-links">
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="report-issue.html">Report Issue</a></li>
            <li><a href="my-issues.html">My Issues</a></li>
            <li><a href="php/logout.php" class="btn-logout">Logout</a></li>
        </ul>
        <div class="user-info">
            <span id="userName">Welcome, User</span>
        </div>
    </nav>
    
    <main class="main-content">
        <div class="dashboard-header">
            <h1>Dashboard</h1>
            <p>Welcome to the Issue Reporting Portal</p>
        </div>
        
        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Issues</h3>
                <p class="stat-number" id="totalIssues">0</p>
            </div>
            <div class="stat-card">
                <h3>Pending</h3>
                <p class="stat-number pending" id="pendingIssues">0</p>
            </div>
            <div class="stat-card">
                <h3>In Progress</h3>
                <p class="stat-number in-progress" id="inProgressIssues">0</p>
            </div>
            <div class="stat-card">
                <h3>Resolved</h3>
                <p class="stat-number resolved" id="resolvedIssues">0</p>
            </div>
        </div>
        
        <div class="quick-actions">
            <h2>Quick Actions</h2>
            <div class="action-buttons">
                <a href="report-issue.html" class="btn btn-primary">Report New Issue</a>
                <a href="my-issues.html" class="btn btn-secondary">View My Issues</a>
            </div>
        </div>
        
        <div class="recent-issues">
            <h2>Recent Issues</h2>
            <table class="issues-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="recentIssuesBody">
                    <!-- Populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </main>
    
    <script src="js/dashboard.js"></script>
</body>
</html>
